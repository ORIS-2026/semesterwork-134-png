services:
  postgres:
    image: postgres:17.7
    container_name: semester_postgres
    environment:
      POSTGRES_DB: "test"
      POSTGRES_USER: "test"
      POSTGRES_PASSWORD: "123456789"
    ports:
      - "5433:5432"
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server --console-address ":9001" /data/
    container_name: minio_semester
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "dimefresh"
      MINIO_ROOT_PASSWORD: "123456789"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
  cache_redis:
    image: redis:latest
    container_name: cache_semester
    ports:
      - "6379:6379"