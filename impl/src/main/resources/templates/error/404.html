<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Небольшие правки для чистого отображения страницы ошибки */
        body {
            overflow: auto;
            background: #f5f5f5;
        }
        .layout, .sidebar, .main {
            display: block;
            padding: 0;
            width: auto;
        }
        .sidebar {
            display: none;
        }
        .auth-wrap {
            margin: 80px auto;
        }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="card auth-card">
        <div class="card__header" th:text="${status} + ' ' + ${error}">404 Страница не найдена</div>
        <div class="card__body">
            <p th:if="${message}" th:text="${message}" class="error-message"></p>
            <p th:unless="${message}">
                К сожалению, запрашиваемая страница не существует или была перемещена.
            </p>
            <p th:if="${path}" class="error-path" style="font-size: 12px; color: #6b7280; margin-top: 8px;">
                Путь: <span th:text="${path}"></span>
            </p>
            <div style="margin-top: 24px;">
                <a href="/" class="btn btn--primary">🏠 На главную</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
