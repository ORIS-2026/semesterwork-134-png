<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<main class="main">
    <div class="auth-wrap">
        <div class="card auth-card">
            <div class="card__header">Авторизация</div>
            <div class="card__body">

                <div th:if="${param.error}" class="empty" style="color:#b91c1c; text-align:left; padding:0 0 10px 0;">
                    <span>Неверный логин или пароль</span>
                </div>

                <form th:action="@{/auth/login}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="username">Логин</label>
                        <input id="username" name="username" type="text" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Пароль</label>
                        <input id="password" name="password" type="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn--primary btn--full">Войти</button>
                </form>

                <a th:href="@{/api/oauth2/authorize}"
                   class="btn btn--full"
                   style="display:block; margin-top:10px; background:#4285F4; color:#fff; border-color:#4285F4; text-align:center; text-decoration:none;">
                    Войти через Google
                </a>

                <div style="margin-top:12px; text-align:center;">
                    <a th:href="@{/auth/register}" class="sidebar__link" style="display:inline-block; padding:0;">
                        Нет аккаунта? Зарегистрироваться
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
